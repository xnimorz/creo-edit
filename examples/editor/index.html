<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Creo Editor — Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f7f7f8;
      color: #1f1f23;
    }
    .shell { max-width: 760px; margin: 0 auto; padding: 32px 16px; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px;
      background: #fff;
      border: 1px solid #e1e1e4;
      border-radius: 8px 8px 0 0;
      border-bottom: none;
    }
    .toolbar select, .toolbar button {
      font: inherit;
      font-size: 13px;
      padding: 4px 10px;
      background: #fff;
      border: 1px solid #d4d4d8;
      border-radius: 4px;
      cursor: pointer;
      color: #1f1f23;
    }
    .toolbar button:hover { background: #f0f0f2; }
    .toolbar button.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
    .toolbar .sep {
      width: 1px;
      background: #e1e1e4;
      margin: 0 4px;
    }

    .creo-editor {
      background: #fff;
      border: 1px solid #e1e1e4;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 24px;
      min-height: 400px;
      line-height: 1.5;
      font-size: 16px;
      color: #1f1f23;
      position: relative;
    }
    .creo-editor-regular { font-family: system-ui, -apple-system, sans-serif; }
    .creo-editor-mono    {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1.6;
    }
    .creo-editor:focus-within { outline: 2px solid #c8d8ee; outline-offset: -2px; }

    .ce-columns {
      margin: 14px 0;
      padding: 8px;
      background: #fafafb;
      border: 1px dashed #d4d4d8;
      border-radius: 4px;
    }
    .ce-col {
      padding: 8px;
      background: #fff;
      border-radius: 3px;
      min-height: 24px;
    }

    .ce-block { margin-bottom: 8px; }
    .ce-h1 { font-size: 28px; font-weight: 700; margin-top: 16px; margin-bottom: 8px; }
    .ce-h2 { font-size: 22px; font-weight: 700; margin-top: 14px; margin-bottom: 6px; }
    .ce-h3 { font-size: 18px; font-weight: 600; margin-top: 12px; margin-bottom: 4px; }
    .ce-h4, .ce-h5, .ce-h6 { font-weight: 600; margin-top: 10px; }

    .ce-list { margin: 6px 0; padding-left: 24px; }
    .ce-li-d1 { margin-left: 24px; }
    .ce-li-d2 { margin-left: 48px; }
    .ce-li-d3 { margin-left: 72px; }

    .ce-table { border-collapse: collapse; margin: 10px 0; }
    .ce-cell {
      border: 1px solid #d4d4d8;
      padding: 6px 10px;
      min-width: 60px;
    }
    .ce-img img { max-width: 100%; height: auto; display: block; }

    code {
      background: #f3f3f5;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: ui-monospace, SF Mono, Menlo, monospace;
      font-size: 0.9em;
    }

    @keyframes creo-caret-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="shell">
    <h1 style="margin-bottom:16px;">Creo Editor</h1>
    <div id="app"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
